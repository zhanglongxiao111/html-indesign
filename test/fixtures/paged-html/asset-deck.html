<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { margin: 0; }
    .page {
      width: 528mm;
      height: 297mm;
      position: relative;
      overflow: hidden;
      background: white;
    }
    .render {
      position: absolute;
      left: 15mm;
      top: 20mm;
      width: 220mm;
      height: 140mm;
      object-fit: cover;
      object-position: center center;
      z-index: 20;
    }
    .ignored-preview {
      position: absolute;
      left: 250mm;
      top: 20mm;
      width: 250mm;
      height: 180mm;
      z-index: 20;
    }
    .drawing {
      position: absolute;
      left: 250mm;
      top: 20mm;
      width: 250mm;
      height: 180mm;
      z-index: 21;
      opacity: 0;
    }
    .psd {
      position: absolute;
      left: 15mm;
      top: 180mm;
      width: 100mm;
      height: 70mm;
      object-fit: contain;
      z-index: 22;
    }
    .ai {
      position: absolute;
      left: 130mm;
      top: 180mm;
      width: 100mm;
      height: 70mm;
      z-index: 23;
    }
    .wrapped-pdf-frame {
      position: absolute;
      left: 245mm;
      top: 180mm;
      width: 100mm;
      height: 70mm;
      border: 1pt solid #123456;
      object-fit: contain;
      z-index: 24;
    }
    .wrapped-pdf-frame object {
      width: 100%;
      height: 100%;
    }
    .linked-pdf {
      position: absolute;
      left: 360mm;
      top: 180mm;
      width: 80mm;
      height: 50mm;
      display: block;
      opacity: 0;
      z-index: 25;
    }
  </style>
</head>
<body>
  <section class="page" data-page id="asset-page">
    <img class="render" src="./assets/render.jpg" data-id-object alt="render">
    <img class="ignored-preview" src="./assets/browser-preview.png" data-id-ignore alt="browser preview only">
    <object class="drawing"
            data="./assets/site-plan.pdf"
            type="application/pdf"
            data-id-object
            data-id-asset-kind="pdf"
            data-id-pdf-page="3"
            data-id-crop="trim"
            data-id-fit="contain"></object>
    <img class="psd"
         src="./assets/lobby.psd"
         data-id-object
         data-id-asset-kind="psd"
         data-id-layer-comp="presentation"
         alt="psd">
    <img class="ai"
         src="./assets/axon.ai"
         data-id-object
         data-id-asset-kind="ai"
         data-id-artboard="2"
         alt="ai">
    <div id="wrapped-pdf-frame"
         class="wrapped-pdf-frame"
         data-id-ignore
         data-id-object-style="wrapped-drawing"
         data-id-frame-style="wrapped-frame">
      <object class="wrapped-pdf"
              data="./assets/site-plan.pdf"
              type="application/pdf"
              data-id-object
              data-id-asset-kind="pdf"></object>
    </div>
    <a id="linked-pdf"
       class="linked-pdf"
       href="./assets/site-plan.pdf"
       data-id-object
       data-id-asset-kind="pdf"
       data-id-pdf-page="2"
       data-id-crop="media">PDF link</a>
  </section>
</body>
</html>
