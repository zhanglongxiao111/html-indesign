<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { margin: 0; }
    .page {
      width: 528mm;
      height: 297mm;
      position: relative;
      overflow: hidden;
      background: #f8f8f8;
    }
    .grid {
      position: absolute;
      left: 15mm;
      top: 20mm;
      width: 498mm;
      height: 240mm;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8mm;
    }
    .card {
      position: relative;
      background: #ffffff;
      border: 1pt solid #999999;
      border-radius: 2mm;
      overflow: hidden;
    }
    .card h2 {
      position: absolute;
      left: 8mm;
      top: 8mm;
      width: 200mm;
      height: 18mm;
      font-size: 18pt;
      line-height: 22pt;
      z-index: 5;
    }
    .card p {
      position: absolute;
      left: 8mm;
      top: 34mm;
      width: 200mm;
      height: 40mm;
      font-size: 12pt;
      line-height: 16pt;
      z-index: 6;
    }
  </style>
</head>
<body>
  <section class="page" data-page id="nested-page">
    <div class="grid">
      <article class="card" data-id-object>
        <h2>案例一</h2>
        <p>卡片内部文本。</p>
      </article>
      <article class="card" data-id-object>
        <h2>案例二</h2>
        <p>另一张卡片。</p>
      </article>
    </div>
  </section>
</body>
</html>
