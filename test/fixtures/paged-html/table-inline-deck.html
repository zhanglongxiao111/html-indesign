<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { margin: 0; }
    .page {
      width: 160mm;
      height: 90mm;
      position: relative;
      background: white;
    }
    table {
      position: absolute;
      left: 10mm;
      top: 10mm;
      width: 90mm;
      border-collapse: collapse;
    }
    td {
      color: #123456;
      font: 12pt/15pt Arial, sans-serif;
      background: rgba(200, 16, 46, .35);
      border: 1pt solid #123456;
      padding: 2mm;
    }
    .delta {
      color: #c8102e;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="page" data-page id="table-inline-page">
    <table data-id-table-style="metrics">
      <tr>
        <td>Net <span class="delta" data-id-character-style="metric-delta">+12%</span><sup data-id-character-style="metric-sup">2</sup></td>
      </tr>
    </table>
  </section>
</body>
</html>
